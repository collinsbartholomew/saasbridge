[build]
  command = "pnpm build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  PNPM_FLAGS = "--frozen-lockfile"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers are delivered by next.config.ts via the Next runtime.
# Netlify-level cache hints for static assets:
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
